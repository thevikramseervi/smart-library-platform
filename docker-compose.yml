services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: smart_library
      POSTGRES_PASSWORD: smart_library
      POSTGRES_DB: smart_library
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_library -d smart_library"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
